<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07080A"/>
      <stop offset="100%" stop-color="#0A0C10"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5CF"/>
      <stop offset="100%" stop-color="#0077B6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Border -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#00E5CF" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Letter T -->
  <g transform="translate(14, 10)">
    <!-- Horizontal bar -->
    <rect x="0" y="0" width="36" height="7" rx="3.5" fill="url(#cyanGlow)"/>
    <!-- Vertical stem -->
    <rect x="14.5" y="0" width="7" height="44" rx="3.5" fill="url(#cyanGlow)"/>
  </g>
  <!-- Glow dot overlay -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#00E5CF" stroke-width="0.5" stroke-opacity="0.15"/>
</svg>
